<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf AYKUŞ Danışmanlık ve Otomasyon - Google Satellite Haritalı Takip</title>
    
    <!-- Harita Kütüphanesi CSS Bağlantıları (Ücretsiz & Harici Kod istemez) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #1b5e20;
            --accent: #00796b;
            --accent-light: #e0f2f1;
            --text-main: #263238;
            --text-muted: #546e7a;
            --bg-body: #eceff1;
            --bg-card: #ffffff;
            --border-radius: 14px;
            --shadow: 0 4px 12px rgba(38, 50, 56, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-name {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.2rem;
            color: #1a237e;
        }

        /* Harita Alanı Tasarımı */
        .map-container {
            background: var(--bg-card);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            position: relative;
        }

        #map {
            height: 500px; /* Harita Yüksekliği */
            width: 100%;
            border-radius: 10px;
            z-index: 1;
        }

        /* Ada Seçim Menüsü */
        .ada-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab-btn {
            background: #cfd8dc;
            color: #37474f;
            border: none;
            padding: 12px 24px;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Özel Harita Bilgi Kutusu Tasarımları (Popup) */
        .custom-popup .leaflet-popup-content-wrapper {
            background: var(--bg-card);
            color: var(--text-main);
            border-radius: 8px;
            padding: 5px;
            font-size: 0.9rem;
        }

        .popup-title {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.05rem;
            margin-bottom: 5px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
        }

        .popup-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            margin-top: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        /* Kontrol Modalı */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(38, 50, 56, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 25px;
            border-radius: var(--border-radius);
            max-width: 400px;
            width: 100%;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .footer-branding {
            background: #263238;
            color: #eceff1;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand-name">⚡ YUSUF AYKUŞ DANIŞMANLIK VE OTOMASYON</div>
        <h1>Coğrafi Vana Kontrol Sistemi</h1>
    </div>

    <!-- Bölge Seçimleri -->
    <div class="ada-tabs">
        <button class="tab-btn active" onclick="focusAda(1)">Bölge / ADA 1</button>
        <button class="tab-btn" onclick="focusAda(2)">Bölge / ADA 2</button>
        <button class="tab-btn" onclick="focusAda(3)">Bölge / ADA 3</button>
    </div>

    <!-- Canlı Uydu Haritası Modülü -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <div class="footer-branding">
        Yusuf AYKUŞ Danışmanlık ve Otomasyon Uydu Destekli GIS Altyapısı.
    </div>
</div>

<!-- Saha Müdahale Modalı -->
<div class="modal" id="control-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 style="margin-bottom:15px; color: var(--primary);" id="modal-valve-name">Vana Ayarı</h3>
        
        <div class="form-group">
            <label>Akış Durumu</label>
            <select id="valve-status-select">
                <option value="Kapalı">🔴 Akış Kesildi (Beklemede)</option>
                <option value="Açık">🔵 Akış Aktif (Sulanıyor)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Besin Enjeksiyonu</label>
            <select id="fertilizer-type">
                <option value="Yok">Uygulama Yok</option>
                <option value="Azotlu">Azot Karışımı</option>
                <option value="Potasyum">Potasyum Karışımı</option>
            </select>
        </div>

        <button class="btn-submit" onclick="saveValveChanges()">Komutu Gönder</button>
    </div>
</div>

<!-- Harita Kütüphanesi Script Bağlantısı -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Örnek Koordinatlar (İzmir Seferihisar merkezli örnek arazi koordinatları ayarlandı)
    const adaCoordinates = {
        1: { center: [38.1965, 26.8395], zoom: 17, name: "ADA 1 (Ana Arazi)" },
        2: { center: [38.1990, 26.8420], zoom: 17, name: "ADA 2 (Üst Arazi)" },
        3: { center: [38.1940, 26.8360], zoom: 17, name: "ADA 3 (Fidanlık)" }
    };

    let map;
    let markersLayer = L.layerGroup();
    let currentAda = 1;
    let selectedValveId = null;

    // LocalStorage Durum Kontrolü
    let systemState = JSON.parse(localStorage.getItem('aykus_map_state')) || {};

    if (Object.keys(systemState).length === 0) {
        // Her adaya harita üzerinde görünecek örnek vana koordinatları tanımlıyoruz
        systemState = {
            1: [
                { id: 1, lat: 38.1962, lng: 26.8391, status: "Kapalı", fertilizer: "Yok", trees: 340 },
                { id: 2, lat: 38.1966, lng: 26.8396, status: "Açık", fertilizer: "Yok", trees: 410 },
                { id: 3, lat: 38.1969, lng: 26.8399, status: "Kapalı", fertilizer: "Yok", trees: 290 }
            ],
            2: [
                { id: 1, lat: 38.1988, lng: 26.8418, status: "Kapalı", fertilizer: "Yok", trees: 500 },
                { id: 2, lat: 38.1992, lng: 26.8423, status: "Kapalı", fertilizer: "Yok", trees: 450 }
            ],
            3: [
                { id: 1, lat: 38.1938, lng: 26.8358, status: "Açık", fertilizer: "Azotlu", trees: 600 },
                { id: 2, lat: 38.1942, lng: 26.8363, status: "Kapalı", fertilizer: "Yok", trees: 580 }
            ]
        };
        localStorage.setItem('aykus_map_state', JSON.stringify(systemState));
    }

    // Haritayı Başlatma Fonksiyonu (Google Satellite Katmanlı)
    function initMap() {
        // İlk açılışta ADA 1 koordinatlarına odaklan
        map = L.map('map').setView(adaCoordinates[1].center, adaCoordinates[1].zoom);

        // Tamamen Ücretsiz Google Uydu (Satellite) Katmanı Entegrasyonu
        L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 21,
            attribution: '&copy; Google Maps Satellite'
        }).addTo(map);

        markersLayer.addTo(map);
        drawValves();
    }

    // Vanaları Haritaya Çizme Fonksiyonu
    function drawValves() {
        markersLayer.clearLayers(); // Önceki vanaları temizle
        const valves = systemState[currentAda];

        valves.forEach(v => {
            // Vananın açık veya kapalı olmasına göre haritadaki rengini belirliyoruz
            const markerColor = v.status === "Açık" ? "#00e676" : "#ff1744"; 
            
            // Harita üzerinde yuvarlak vana butonları oluşturma
            const marker = L.circleMarker([v.lat, v.lng], {
                radius: 10,
                fillColor: markerColor,
                color: "#ffffff",
                weight: 2,
                fillOpacity: 0.9
            });

            // Vana üzerine tıklandığında açılacak bilgi penceresi (Popup)
            const popupContent = `
                <div class="custom-popup">
                    <div class="popup-title">Vana No: ${v.id}</div>
                    <b>Durum:</b> ${v.status === 'Açık' ? '🔵 Aktif Sulanıyor' : '🔴 Kapalı'}<br>
                    <b>Ağaç Sayısı:</b> ${v.trees}<br>
                    <b>Gübre Enjeksiyonu:</b> ${v.fertilizer}<br>
                    <button class="popup-btn" onclick="openControlModal(${v.id})">Durumu Değiştir</button>
                </div>
            `;

            marker.bindPopup(popupContent);
            markersLayer.addLayer(marker);
        });
    }

    // Seçilen Adaya Gitme ve Haritayı Oraya Kaydırma
    function focusAda(adaId) {
        currentAda = adaId;
        document.querySelectorAll('.tab-btn').forEach((btn, index) => {
            btn.classList.toggle('active', index === (adaId - 1));
        });
        
        // Haritayı yumuşak bir şekilde yeni adaya kaydır
        map.flyTo(adaCoordinates[adaId].center, adaCoordinates[adaId].zoom);
        drawValves();
    }

    // Kontrol Panelini Açma
    function openControlModal(valveId) {
        selectedValveId = valveId;
        const valve = systemState[currentAda].find(v => v.id === valveId);
        
        document.getElementById('modal-valve-name').innerText = `Vana ${valveId} - Komut Merkezi`;
        document.getElementById('valve-status-select').value = valve.status;
        document.getElementById('fertilizer-type').value = valve.fertilizer;
        
        document.getElementById('control-modal').style.display = 'flex';
        map.closePopup(); // Haritadaki küçük popup'ı kapat
    }

    function closeModal() {
        document.getElementById('control-modal').style.display = 'none';
    }

    // Değişiklikleri Veritabanına (LocalStorage) Kaydedip Haritada Canlı Güncelleme
    function saveValveChanges() {
        const valve = systemState[currentAda].find(v => v.id === selectedValveId);
        valve.status = document.getElementById('valve-status-select').value;
        valve.fertilizer = document.getElementById('fertilizer-type').value;

        localStorage.setItem('aykus_map_state', JSON.stringify(systemState));
        drawValves(); // Haritadaki renkleri güncelle
        closeModal();
    }

    // Haritayı yükle
    window.onload = initMap;
</script>
</body>
</html>
